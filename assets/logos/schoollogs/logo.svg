<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="60" fill="#007bff" rx="8"/>

  <!-- School building icon -->
  <g transform="translate(10, 15)">
    <!-- Building -->
    <rect x="0" y="10" width="25" height="20" fill="white"/>
    <!-- Roof -->
    <polygon points="0,10 12.5,0 25,10" fill="#dc3545"/>
    <!-- Windows -->
    <rect x="3" y="13" width="5" height="4" fill="#007bff"/>
    <rect x="10" y="13" width="5" height="4" fill="#007bff"/>
    <rect x="17" y="13" width="5" height="4" fill="#007bff"/>
    <rect x="3" y="19" width="5" height="4" fill="#007bff"/>
    <rect x="10" y="19" width="5" height="4" fill="#007bff"/>
    <rect x="17" y="19" width="5" height="4" fill="#007bff"/>
    <!-- Door -->
    <rect x="10" y="23" width="5" height="7" fill="#8B4513"/>
  </g>

  <!-- Text -->
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">A.S. HIGHER SECONDARY</text>
  <text x="45" y="40" font-family="Arial, sans-serif" font-size="10" fill="white">SCHOOL MANAGEMENT</text>
  <text x="45" y="50" font-family="Arial, sans-serif" font-size="8" fill="#e3f2fd">Excellence in Education</text>
</svg>